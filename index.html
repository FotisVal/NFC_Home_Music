<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cooper Routine</title>

<style>
@font-face {
    font-family: 'CustomFont';
    src: url('https://raw.githubusercontent.com/FotisVal/NFC_Home_Music/9086892e1cfb13d0e3f10e926b5b318df55aa4dd/fonts/GRAYSTROKE%20ITALIC.otf') format('truetype');
}

body {
    background: linear-gradient(180deg, #1f1f1f, #3a3a3a);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
}

.header {
    background: #111;
    padding: 18px 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.header h1 {
    font-family: 'CustomFont', sans-serif;
    color: #FFD700;
    font-size: 2.6em;
    margin: 0;
}

h2 {
    font-weight: normal;
    color: #bbb;
}

.button-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-top: 25px;
}

.button {
    background: #2b2b2b;
    border: none;
    padding: 16px 30px;
    font-size: 1.3em;
    border-radius: 16px;
    cursor: pointer;
    width: 260px;
    color: white;
    transition: 0.25s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.button:hover {
    background: #444;
    transform: translateY(-2px) scale(1.03);
}

.call { background: #0a7cff; }
.call:hover { background: #2891ff; }

.home { background: #ff3b30; }
.home:hover { background: #ff5c54; }

.spotify-box {
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    width: 90%;
    max-width: 420px;
}

.open-spotify {
    display: inline-block;
    margin-top: 12px;
    background: #1DB954;
    padding: 12px 22px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

.open-spotify:hover {
    background: #31d86e;
}

.corner-image {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 110px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
    <h1>Mini Cooper Routine</h1>
</div>

<h2>Tap NFC and go 🚗</h2>

<div class="button-container">

    <!-- AUTO CALL BUTTON (hidden trigger) -->
    <a id="autoCall" href="tel:+306983718263"></a>

    <!-- Visible Call Button -->
    <button class="button call" onclick="makeCall()">📞 Call Home</button>

    <!-- Take Me Home -->
    <button class="button home" onclick="navigateToHome()">📍 Take me Home</button>

    <!-- Spotify Box -->
    <div class="spotify-box">
        <iframe style="border-radius:14px"
            src="https://open.spotify.com/embed/playlist/37i9dQZF1E39oixsPcANo4"
            width="100%" height="180" frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a href="https://open.spotify.com/playlist/37i9dQZF1E39oixsPcANo4" class="open-spotify">
            Open Full Spotify
        </a>
    </div>

</div>

<img src="https://raw.githubusercontent.com/FotisVal/NFC_Home_Music/main/pngegg.png" class="corner-image">

<script>
// ===== AUTO CALL WITHOUT GREEN BUTTON =====
function makeCall() {
  window.location.href = "tel:+306983718263";
}

// Optional: auto‑call after NFC open (1.2 sec delay so browser allows it)
window.addEventListener("load", () => {
  setTimeout(() => {
    makeCall();
  }, 1200);
});

// ===== NAVIGATE HOME =====
const homeTranslations = {
  en: "home",
  es: "casa",
  fr: "domicile",
  de: "heim",
  it: "casa",
  pt: "casa",
  ru: "дом",
  zh: "家",
  ja: "家",
  ko: "집",
  el: "σπίτι"
};

function navigateToHome() {
  const userLang = Intl.DateTimeFormat().resolvedOptions().locale || navigator.language;
  const langCode = userLang.split("-")[0];
  const homeLabel = homeTranslations[langCode] || "home";

  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${homeLabel}&travelmode=driving&dir_action=navigate`;

  window.open(mapsUrl, "_blank");
}
</script>

</body>
</html>
