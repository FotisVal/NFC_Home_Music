<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cooper Routine</title>

<style>
@font-face {
    font-family: 'CustomFont';
    src: url('https://raw.githubusercontent.com/FotisVal/NFC_Home_Music/9086892e1cfb13d0e3f10e926b5b318df55aa4dd/fonts/GRAYSTROKE%20ITALIC.otf') format('truetype');
}

body {
    background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
}

.header {
    background: rgba(0,0,0,0.4);
    padding: 18px 0;
    backdrop-filter: blur(8px);
}

.header h1 {
    font-family: 'CustomFont', sans-serif;
    color: #FFD700;
    font-size: 2.4em;
    margin: 0;
}

.dashboard {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 16px;
    border-radius: 18px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.temp {
    font-size: 2.2em;
    font-weight: bold;
}

.desc {
    color: #ddd;
}

.button {
    background: #2b2b2b;
    border: none;
    padding: 15px 26px;
    font-size: 1.2em;
    border-radius: 14px;
    cursor: pointer;
    width: 240px;
    color: white;
    transition: 0.25s;
    margin-top: 6px;
}

.call { background: #0a7cff; }
.home { background: #ff3b30; }

.spotify-box iframe {
    width: 100%;
    border-radius: 12px;
}

.open-spotify {
    display: inline-block;
    margin-top: 10px;
    background: #1DB954;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Mini Cooper Dashboard</h1>
</div>

<div class="dashboard">

    <!-- WEATHER CARD -->
    <div class="card">
        <div id="weatherCity">Loading weather...</div>
        <div class="temp" id="weatherTemp"></div>
        <div class="desc" id="weatherDesc"></div>
    </div>

    <!-- CALL & NAVIGATION -->
    <div class="card">
        <button class="button call" onclick="makeCall()">📞 Call Home</button>
        <button class="button home" onclick="navigateToHome()">📍 Take me Home</button>
    </div>

    <!-- SPOTIFY -->
    <div class="card spotify-box">
        <iframe
            src="https://open.spotify.com/embed/playlist/37i9dQZF1E39oixsPcANo4"
            height="160"
            frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a href="https://open.spotify.com/playlist/37i9dQZF1E39oixsPcANo4" class="open-spotify">
            Open Full Spotify
        </a>
    </div>

</div>

<script>
// ===== AUTO CALL =====
function makeCall() {
  window.location.href = "tel:+3069XXXXXXXX";
}

// ===== WEATHER =====
async function loadWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=37.98&longitude=23.72&current_weather=true");
    const data = await res.json();

    document.getElementById("weatherCity").innerText = "Athens τώρα";
    document.getElementById("weatherTemp").innerText = data.current_weather.temperature + "°C";
    document.getElementById("weatherDesc").innerText = "Άνεμος " + data.current_weather.windspeed + " km/h";
  } catch {
    document.getElementById("weatherCity").innerText = "Weather unavailable";
  }
}

loadWeather();

// ===== NAVIGATION =====
const homeTranslations = {
  en: "home",
  el: "σπίτι"
};

function navigateToHome() {
  const userLang = navigator.language.split("-")[0];
  const homeLabel = homeTranslations[userLang] || "home";

  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${homeLabel}&travelmode=driving&dir_action=navigate`;

  window.open(mapsUrl, "_blank");
}

// ===== OPTIONAL AUTO CALL AFTER NFC =====
window.addEventListener("load", () => {
  setTimeout(() => {
    makeCall();
  }, 1200);
});
</script>

</body>
</html>
