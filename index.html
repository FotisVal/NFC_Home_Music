<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cooper Routine</title>

<style>
@font-face {
    font-family: 'CustomFont';
    src: url('https://raw.githubusercontent.com/FotisVal/NFC_Home_Music/9086892e1cfb13d0e3f10e926b5b318df55aa4dd/fonts/GRAYSTROKE%20ITALIC.otf') format('truetype');
}

body {
    background: linear-gradient(180deg, #1f1f1f, #3a3a3a);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
}

.header {
    background: #111;
    padding: 18px 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.header h1 {
    font-family: 'CustomFont', sans-serif;
    color: #FFD700;
    font-size: 2.6em;
    margin: 0;
}

h2 {
    font-weight: normal;
    color: #bbb;
}

.button-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-top: 30px;
}

.button {
    background: #2b2b2b;
    border: none;
    padding: 16px 30px;
    font-size: 1.3em;
    border-radius: 16px;
    cursor: pointer;
    width: 260px;
    color: white;
    transition: 0.25s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.button:hover {
    background: #444;
    transform: translateY(-2px) scale(1.03);
}

.call { background: #0a7cff; }
.call:hover { background: #2891ff; }

.spotify { background: #1DB954; }
.spotify:hover { background: #31d86e; }

.home { background: #ff3b30; }
.home:hover { background: #ff5c54; }

.corner-image {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 110px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
    <h1>Mini Cooper Routine</h1>
</div>

<h2>Press the button</h2>

<div class="button-container">

    <!-- Spotify Embed -->
    <iframe style="border-radius:14px"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1E39oixsPcANo4"
        width="85%" height="180" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

    <!-- Open Spotify App -->
    <a href="https://open.spotify.com/playlist/37i9dQZF1E39oixsPcANo4" class="button spotify">
        🎵 Open in Spotify
    </a>

    <!-- Phone Call -->
    <a href="tel:+3069XXXXXXXX" class="button call">
        📞 Call
    </a>

    <!-- Take Me Home -->
    <button class="button home" onclick="navigateToHome()">
        📍 Take me Home
    </button>

</div>

<img src="https://raw.githubusercontent.com/FotisVal/NFC_Home_Music/main/pngegg.png" class="corner-image">

<script>
const homeTranslations = {
  en: "home",
  es: "casa",
  fr: "domicile",
  de: "heim",
  it: "casa",
  pt: "casa",
  ru: "дом",
  zh: "家",
  ja: "家",
  ko: "집",
  el: "σπίτι"
};

function navigateToHome() {
  const userLang = Intl.DateTimeFormat().resolvedOptions().locale || navigator.language;
  const langCode = userLang.split("-")[0];
  const homeLabel = homeTranslations[langCode] || "home";

  const mapsUrl =
    `https://www.google.com/maps/dir/?api=1&destination=${homeLabel}&travelmode=driving&dir_action=navigate`;

  window.open(mapsUrl, "_blank");
}
</script>

</body>
</html>
